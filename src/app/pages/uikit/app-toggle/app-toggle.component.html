@if (!hidden) {
    <div class="flex flex-col gap-1.5">
        @if (label) {
            <label class="text-sm font-medium text-color" [for]="id">{{ label | translate }}</label>
        }
        <p-toggleswitch
            [id]="id"
            [ngModel]="value"
            (ngModelChange)="onValueChange($event)"
            [disabled]="disabled || readonly"
        />
    </div>
}
