@if (!hidden) {
    <div class="flex flex-col gap-1.5">
        @if (label || placeholder) {
            <label [for]="id" class="text-sm font-medium text-color">
                {{ (label || placeholder) | translate }}@if (required) {<span class="text-red-500 ml-0.5">*</span>}
            </label>
        }
        <input
            pInputText
            [id]="id"
            [placeholder]="(placeholder || label) | translate"
            [ngModel]="value"
            (ngModelChange)="onValueChange($event)"
            [readOnly]="readonly"
            [disabled]="disabled"
            class="w-full"
            [ngClass]="{ 'ng-invalid ng-dirty': isInvalid }"
        />
        @if (isInvalid && errorMessage) {
            <small class="text-red-500">{{ errorMessage | translate }}</small>
        }
    </div>
}
