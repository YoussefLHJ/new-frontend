<p-dialog [(visible)]="visible"
          [style]="{ width: dialogWidth() }"
          [header]="title() | translate"
          [modal]="true"
          styleClass="p-fluid"
          [maximizable]="true"
          [draggable]="false"
          [resizable]="false"
          [breakpoints]="{ '960px': '95vw' }">

    @if (contentTpl()) {
        <ng-container [ngTemplateOutlet]="contentTpl()!" />
    } @else {
        <ng-content></ng-content>
    }

    <ng-template #footer>
        <div class="flex justify-end gap-2 p-4">
            @if (showAction()) {
                <p-button [label]="'validate' | translate" icon="pi pi-check"
                          (onClick)="onAction.emit()"
                          [disabled]="actionDisabled()" />
            }
            <p-button [label]="cancelLabel() | translate" icon="pi pi-times"
                      [outlined]="true" severity="secondary"
                      (onClick)="hide()" />
        </div>
    </ng-template>
</p-dialog>
