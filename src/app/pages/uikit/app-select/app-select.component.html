@if (!hidden) {
    <div class="flex flex-col gap-1.5">
        @if (label || placeholder) {
            <label [for]="id" class="text-sm font-medium text-color">
                {{ (label || placeholder) | translate }}@if (required) { <span class="text-red-500">*</span> }
            </label>
        }
        <p-select
            [inputId]="id"
            [placeholder]="(placeholder || label) | translate"
            [ngModel]="value"
            (ngModelChange)="onValueChange($event)"
            [options]="options"
            [optionLabel]="optionLabel"
            [filter]="filter"
            [filterMatchMode]="filterMatchMode"
            [showClear]="showClear"
            [disabled]="disabled || readonly"
            appendTo="body"
            Class="w-full"
        />
        @if (isInvalid && errorMessage) {
            <small class="text-red-500">{{ errorMessage | translate }}</small>
        }
    </div>
}
