    <p-dialog [(visible)]="createDialog" [style]="{width: '70vw'}" header="{{'zoneVilleRegionReleve.tabPan' | translate}}" [modal]="true" styleClass="p-fluid" [maximizable]="true" [draggable]="false" [resizable]="false">
<ng-template pTemplate="content" >
        <p-tabView>
            <p-tabPanel header="{{'zoneVilleRegionReleve.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'zoneVilleRegionReleve.numero' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'zoneVilleRegionReleve.numero' | translate}}" id="1" [(ngModel)]="item.numero"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validZoneVilleRegionReleveNumero}"  />
                                    <small class="text-red-500" *ngIf='!validZoneVilleRegionReleveNumero'>Numero is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'zoneVilleRegionReleve.libelle' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'zoneVilleRegionReleve.libelle' | translate}}" id="2" [(ngModel)]="item.libelle"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validZoneVilleRegionReleveLibelle}"  />
                                    <small class="text-red-500" *ngIf='!validZoneVilleRegionReleveLibelle'>Libelle is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'zoneVilleRegionReleve.description' | translate}}</label>
                                    <textarea id="3" pTextarea rows="5" cols="30" placeholder="{{'zoneVilleRegionReleve.description' | translate}}"  [(ngModel)]="item.description"
                                               ></textarea>
                                    
                                </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="4">{{'zoneVilleRegionReleve.zoneVilleReleve' | translate}}</label>
                                <p-dropdown class="w-full"  appendTo="body"  [options]="zoneVilleReleves" [(ngModel)]="item.zoneVilleReleve" id="4" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="libelle" placeholder="{{'zoneVilleRegionReleve.zoneVilleReleve' | translate}}"  >
                                </p-dropdown>
                                
                            </div>

                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="6">{{'zoneVilleRegionReleve.actif' | translate}}</label>

                                    <p-inputSwitch id="6"  [(ngModel)]="item.actif"
                                                    >
                                    </p-inputSwitch>
                                    

                                </div>


                </div>
            </p-tabPanel>
                    <p-tabPanel header="{{'zoneVilleRegionReleve.zoneAgenceReleves' | translate}}">
                        <p-tabView [(activeIndex)]="activeTab">
                            <p-tabPanel header="Création">

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4">


                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="1">Numero<span class="text-red-500">*</span></label>
                                                    <input type="text" pInputText placeholder="Numero"
                                                           id="1" [(ngModel)]="zoneAgenceRelevesElement.numero" autofocus  [ngClass]="{'ng-invalid ng-dirty' : !validZoneAgenceRelevesNumero}"  >
                                                    <small class="text-red-500" *ngIf='!validZoneAgenceRelevesNumero'>Numero is obligatory.</small>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="2">Libelle<span class="text-red-500">*</span></label>
                                                    <input type="text" pInputText placeholder="Libelle"
                                                           id="2" [(ngModel)]="zoneAgenceRelevesElement.libelle" autofocus  [ngClass]="{'ng-invalid ng-dirty' : !validZoneAgenceRelevesLibelle}"  >
                                                    <small class="text-red-500" *ngIf='!validZoneAgenceRelevesLibelle'>Libelle is obligatory.</small>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="3">{{'zoneAgenceReleve.description' | translate}}</label>
                                                    <textarea id="3" pTextarea rows="5" cols="30" placeholder="{{'zoneAgenceReleve.description' | translate}}"  [(ngModel)]="zoneAgenceRelevesElement.description"
                                                               ></textarea>
                                                    
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="6">Actif</label>

                                                    <p-inputSwitch id="6"  [(ngModel)]="zoneAgenceRelevesElement.actif"></p-inputSwitch>

                                                </div>
                                    <div class="flex justify-end md:col-span-3">
                                        <button pButton type="button" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-700" (click)="addZoneAgenceReleves()">
                                            <i class="pi pi-plus"></i> OK
                                        </button>
                                    </div>

                                </div>
                            </p-tabPanel>
                            <p-tabPanel header="Liste {{item.zoneAgenceReleves?.length > 0 ? '(' + item.zoneAgenceReleves?.length + ')' : ''}}">
                                <div class="card p-4">
                                    <p-table [value]="item.zoneAgenceReleves" [scrollable]="true" scrollHeight="200px">
                                        <ng-template pTemplate="header">
                                            <tr>
                                                            <th>Numero</th>
                                                            <th>Libelle</th>
                                                            <th>Description</th>
                                                            <th>Actif</th>
                                                <th>Actions</th>
                                            </tr>
                                        </ng-template>
                                        <ng-template pTemplate="body" let-p let-i="rowIndex">
                                            <tr>
                                                            <td>{{p.numero}}</td>
                                                            <td>{{p.libelle}}</td>
                                                            <td>{{p.description}}</td>
                                                            <td><i *ngIf="p.actif" class="pi pi-check checked-toogle"></i>
                                                                <i *ngIf="!p.actif" class="pi pi-times unchecked-toogle"></i>
                                                            </td>
                                                <td>
                                                    <p-button (click)="deleteZoneAgenceReleves(p,i)" pButton type="button" icon="pi pi-times" severity="danger"  [rounded]="true"  class="mr-2"></p-button>
                                                    <p-button (click)="editZoneAgenceReleves(p,i)" pButton type="button" icon="pi pi-pencil" severity="success"  [rounded]="true" class="mr-2"></p-button>
                                                </td>
                                            </tr>
                                        </ng-template>
                                    </p-table>
                                </div>

                            </p-tabPanel>
                        </p-tabView>
                    </p-tabPanel>


        </p-tabView>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">

            <button (click)="save()" label="{{'validate' | translate}}"  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </p-dialog>
