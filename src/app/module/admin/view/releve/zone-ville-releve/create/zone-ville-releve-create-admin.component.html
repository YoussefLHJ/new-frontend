    <p-dialog [(visible)]="createDialog" [style]="{width: '70vw'}" header="{{'zoneVilleReleve.tabPan' | translate}}" [modal]="true" styleClass="p-fluid" [maximizable]="true" [draggable]="false" [resizable]="false">
<ng-template pTemplate="content" >
        <p-tabView>
            <p-tabPanel header="{{'zoneVilleReleve.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'zoneVilleReleve.numero' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'zoneVilleReleve.numero' | translate}}" id="1" [(ngModel)]="item.numero"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validZoneVilleReleveNumero}"  />
                                    <small class="text-red-500" *ngIf='!validZoneVilleReleveNumero'>Numero is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'zoneVilleReleve.libelle' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'zoneVilleReleve.libelle' | translate}}" id="2" [(ngModel)]="item.libelle"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validZoneVilleReleveLibelle}"  />
                                    <small class="text-red-500" *ngIf='!validZoneVilleReleveLibelle'>Libelle is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'zoneVilleReleve.description' | translate}}</label>
                                    <textarea id="3" pTextarea rows="5" cols="30" placeholder="{{'zoneVilleReleve.description' | translate}}"  [(ngModel)]="item.description"
                                               ></textarea>
                                    
                                </div>

                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="5">{{'zoneVilleReleve.actif' | translate}}</label>

                                    <p-inputSwitch id="5"  [(ngModel)]="item.actif"
                                                    >
                                    </p-inputSwitch>
                                    

                                </div>


                </div>
            </p-tabPanel>
                    <p-tabPanel header="{{'zoneVilleReleve.zoneVilleRegionReleves' | translate}}">
                        <p-tabView [(activeIndex)]="activeTab">
                            <p-tabPanel header="Création">

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4">


                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="1">Numero<span class="text-red-500">*</span></label>
                                                    <input type="text" pInputText placeholder="Numero"
                                                           id="1" [(ngModel)]="zoneVilleRegionRelevesElement.numero" autofocus  [ngClass]="{'ng-invalid ng-dirty' : !validZoneVilleRegionRelevesNumero}"  >
                                                    <small class="text-red-500" *ngIf='!validZoneVilleRegionRelevesNumero'>Numero is obligatory.</small>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="2">Libelle<span class="text-red-500">*</span></label>
                                                    <input type="text" pInputText placeholder="Libelle"
                                                           id="2" [(ngModel)]="zoneVilleRegionRelevesElement.libelle" autofocus  [ngClass]="{'ng-invalid ng-dirty' : !validZoneVilleRegionRelevesLibelle}"  >
                                                    <small class="text-red-500" *ngIf='!validZoneVilleRegionRelevesLibelle'>Libelle is obligatory.</small>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="3">{{'zoneVilleRegionReleve.description' | translate}}</label>
                                                    <textarea id="3" pTextarea rows="5" cols="30" placeholder="{{'zoneVilleRegionReleve.description' | translate}}"  [(ngModel)]="zoneVilleRegionRelevesElement.description"
                                                               ></textarea>
                                                    
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="6">Actif</label>

                                                    <p-inputSwitch id="6"  [(ngModel)]="zoneVilleRegionRelevesElement.actif"></p-inputSwitch>

                                                </div>
                                    <div class="flex justify-end md:col-span-3">
                                        <button pButton type="button" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-700" (click)="addZoneVilleRegionReleves()">
                                            <i class="pi pi-plus"></i> OK
                                        </button>
                                    </div>

                                </div>
                            </p-tabPanel>
                            <p-tabPanel header="Liste {{item.zoneVilleRegionReleves?.length > 0 ? '(' + item.zoneVilleRegionReleves?.length + ')' : ''}}">
                                <div class="card p-4">
                                    <p-table [value]="item.zoneVilleRegionReleves" [scrollable]="true" scrollHeight="200px">
                                        <ng-template pTemplate="header">
                                            <tr>
                                                            <th>Numero</th>
                                                            <th>Libelle</th>
                                                            <th>Description</th>
                                                            <th>Actif</th>
                                                <th>Actions</th>
                                            </tr>
                                        </ng-template>
                                        <ng-template pTemplate="body" let-p let-i="rowIndex">
                                            <tr>
                                                            <td>{{p.numero}}</td>
                                                            <td>{{p.libelle}}</td>
                                                            <td>{{p.description}}</td>
                                                            <td><i *ngIf="p.actif" class="pi pi-check checked-toogle"></i>
                                                                <i *ngIf="!p.actif" class="pi pi-times unchecked-toogle"></i>
                                                            </td>
                                                <td>
                                                    <p-button (click)="deleteZoneVilleRegionReleves(p,i)" pButton type="button" icon="pi pi-times" severity="danger"  [rounded]="true"  class="mr-2"></p-button>
                                                    <p-button (click)="editZoneVilleRegionReleves(p,i)" pButton type="button" icon="pi pi-pencil" severity="success"  [rounded]="true" class="mr-2"></p-button>
                                                </td>
                                            </tr>
                                        </ng-template>
                                    </p-table>
                                </div>

                            </p-tabPanel>
                        </p-tabView>
                    </p-tabPanel>


        </p-tabView>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">

            <button (click)="save()" label="{{'validate' | translate}}"  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </p-dialog>
