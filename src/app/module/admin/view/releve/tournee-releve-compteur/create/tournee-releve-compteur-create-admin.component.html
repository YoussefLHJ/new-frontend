    <p-dialog [(visible)]="createDialog" [style]="{width: '70vw'}" header="{{'tourneeReleveCompteur.tabPan' | translate}}" [modal]="true" styleClass="p-fluid" [maximizable]="true" [draggable]="false" [resizable]="false">
<ng-template pTemplate="content" >
        <p-tabView>
            <p-tabPanel header="{{'tourneeReleveCompteur.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="1">{{'tourneeReleveCompteur.appareil' | translate}}</label>
                                <p-dropdown class="w-full"  appendTo="body"  [options]="appareils" [(ngModel)]="item.appareil" id="1" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="numeroAppareil" placeholder="{{'tourneeReleveCompteur.appareil' | translate}}"  >
                                </p-dropdown>
                                
                            </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'tourneeReleveCompteur.indice' | translate}}</label>
                                    <p-inputNumber  id="2" placeholder="{{'tourneeReleveCompteur.indice' | translate}}" [(ngModel)]="item.indice"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'tourneeReleveCompteur.indicePrecedent' | translate}}</label>
                                    <p-inputNumber  id="3" placeholder="{{'tourneeReleveCompteur.indicePrecedent' | translate}}" [(ngModel)]="item.indicePrecedent"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="4">{{'tourneeReleveCompteur.consommation' | translate}}</label>
                                    <p-inputNumber  id="4" placeholder="{{'tourneeReleveCompteur.consommation' | translate}}" [(ngModel)]="item.consommation"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="5">{{'tourneeReleveCompteur.seuilComsommation' | translate}}</label>
                                    <p-inputNumber  id="5" placeholder="{{'tourneeReleveCompteur.seuilComsommation' | translate}}" [(ngModel)]="item.seuilComsommation"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="6">{{'tourneeReleveCompteur.commentaire' | translate}}</label>
                                    <textarea id="6" pTextarea rows="5" cols="30" placeholder="{{'tourneeReleveCompteur.commentaire' | translate}}"  [(ngModel)]="item.commentaire"
                                               ></textarea>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="7">{{'tourneeReleveCompteur.photo' | translate}}</label>
                                    <input type="text" pInputText  placeholder="{{'tourneeReleveCompteur.photo' | translate}}" id="7" [(ngModel)]="item.photo"
                                            />
                                    
                                </div>


                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="8">{{'tourneeReleveCompteur.tourneeReleveDetail' | translate}}</label>
                                <p-dropdown class="w-full"  appendTo="body"  [options]="tourneeReleveDetails" [(ngModel)]="item.tourneeReleveDetail" id="8" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="id" placeholder="{{'tourneeReleveCompteur.tourneeReleveDetail' | translate}}"  >
                                </p-dropdown>
                                
                            </div>

                </div>
            </p-tabPanel>

        </p-tabView>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">

            <button (click)="save()" label="{{'validate' | translate}}"  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </p-dialog>
