<p-dialog [(visible)]="viewDialog" [style]="{width: '70vw'}" header="{{'uniteReleve.tabPan' | translate}}" [modal]="true" styleClass="p-fluid">
    <ng-template pTemplate="content">
        <p-tabView>
            <p-tabPanel header="{{'uniteReleve.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'uniteReleve.numero' | translate}}</label>
                                    <input  type="text" pInputText [disabled]="true" placeholder="{{'uniteReleve.numero' | translate}}" autofocus  id="1" [ngModel]="item.numero">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'uniteReleve.libelle' | translate}}</label>
                                    <input  type="text" pInputText [disabled]="true" placeholder="{{'uniteReleve.libelle' | translate}}" autofocus  id="2" [ngModel]="item.libelle">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'uniteReleve.description' | translate}}</label>
                                    <textarea id="3" pTextarea rows="5" cols="30" [disabled]="true" placeholder="{{'uniteReleve.description' | translate}}"  [ngModel]="item.description"></textarea>
                                </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="4">{{'uniteReleve.zoneAgenceReleve' | translate}}</label>
                                <input type="text" pInputText [disabled]="true" placeholder="{{'uniteReleve.zoneAgenceReleve' | translate}}" autofocus  id="4" [ngModel]="item.zoneAgenceReleve?.libelle">
                            </div>
                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="5">{{'uniteReleve.actif' | translate}}</label>

                                    <p-inputSwitch id="5"  [disabled]="true" [ngModel]="item.actif"></p-inputSwitch>

                                </div>
                </div>
            </p-tabPanel>

                    <p-tabPanel header="{{'uniteReleve.lotReleves' | translate}}">
                        <div class="card p-4">
                            <p-table [value]="item.lotReleves" [scrollable]="true" scrollHeight="200px">
                                <ng-template pTemplate="header">
                                    <tr>
                                                    <th>Numero</th>
                                                    <th>Code</th>
                                                    <th>Nb batiments</th>
                                                    <th>Nb compteurs a lire</th>
                                                    <th>Nb compteurs charges</th>
                                                    <th>Date creation</th>
                                                    <th>Date mise a jour</th>
                                                    <th>Actif</th>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="body" let-p>
                                    <tr>
                                                    <td>{{p.numero}}</td>
                                                    <td>{{p.code}}</td>
                                                    <td>{{p.nbBatiments}}</td>
                                                    <td>{{p.nbCompteursALire}}</td>
                                                    <td>{{p.nbCompteursCharges}}</td>
                                                    <td>{{p.dateCreation | date: dateFormatColumn}}</td>
                                                    <td>{{p.dateMiseAJour | date: dateFormatColumn}}</td>
                                                    <td><i *ngIf="p.actif" class="pi pi-check checked-toogle"></i>
                                                        <i *ngIf="!p.actif" class="pi pi-times unchecked-toogle"></i>
                                                    </td>
                                    </tr>
                                </ng-template>
                            </p-table>
                        </div>
                    </p-tabPanel>
        </p-tabView>

    </ng-template>

    <ng-template pTemplate="footer" >
        <div class="flex justify-end p-4">
            <div>
                <button class="border border-gray-400 font-semibold py-2 px-4 rounded shadow" (click)="hideViewDialog()">
                    <i class="pi pi-times"></i> Annuler
                </button>
            </div>
        </div>
    </ng-template>
</p-dialog>
