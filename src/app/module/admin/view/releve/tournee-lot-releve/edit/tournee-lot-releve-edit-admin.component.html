    <p-dialog [(visible)]="editDialog" [style]="{width: '70vw'}" header="{{'tourneeLotReleve.tabPan' | translate}}" [modal]="true" styleClass="p-fluid" [maximizable]="true" [draggable]="false" [resizable]="false">
<ng-template pTemplate="content" >
        <p-tabView>
            <p-tabPanel header="{{'tourneeLotReleve.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'tourneeLotReleve.numero' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'tourneeLotReleve.numero' | translate}}" id="1" [(ngModel)]="item.numero"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validTourneeLotReleveNumero}"  />
                                    <small class="text-red-500" *ngIf='!validTourneeLotReleveNumero'>Numero is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'tourneeLotReleve.libelle' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'tourneeLotReleve.libelle' | translate}}" id="2" [(ngModel)]="item.libelle"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validTourneeLotReleveLibelle}"  />
                                    <small class="text-red-500" *ngIf='!validTourneeLotReleveLibelle'>Libelle is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'tourneeLotReleve.annee' | translate}}<span style="color: red;">*</span></label>
                                    <p-inputNumber  id="3" placeholder="{{'tourneeLotReleve.annee' | translate}}" [(ngModel)]="item.annee" [ngClass]="{'ng-invalid ng-dirty' : !validTourneeLotReleveAnnee}"  >
                                    </p-inputNumber>
                                    <small class="text-red-500" *ngIf='!validTourneeLotReleveAnnee'>Annee is obligatory.</small>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="4">{{'tourneeLotReleve.period' | translate}}<span style="color: red;">*</span></label>
                                    <p-inputNumber  id="4" placeholder="{{'tourneeLotReleve.period' | translate}}" [(ngModel)]="item.period" [ngClass]="{'ng-invalid ng-dirty' : !validTourneeLotRelevePeriod}"  >
                                    </p-inputNumber>
                                    <small class="text-red-500" *ngIf='!validTourneeLotRelevePeriod'>Period is obligatory.</small>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="5">{{'tourneeLotReleve.jourDebutReleve' | translate}}</label>
                                    <p-inputNumber  id="5" placeholder="{{'tourneeLotReleve.jourDebutReleve' | translate}}" [(ngModel)]="item.jourDebutReleve"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="6">{{'tourneeLotReleve.moisDebutReleve' | translate}}</label>
                                    <p-inputNumber  id="6" placeholder="{{'tourneeLotReleve.moisDebutReleve' | translate}}" [(ngModel)]="item.moisDebutReleve"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="7">{{'tourneeLotReleve.nbLots' | translate}}</label>
                                    <p-inputNumber  id="7" placeholder="{{'tourneeLotReleve.nbLots' | translate}}" [(ngModel)]="item.nbLots"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="8">{{'tourneeLotReleve.nbBatiments' | translate}}</label>
                                    <p-inputNumber  id="8" placeholder="{{'tourneeLotReleve.nbBatiments' | translate}}" [(ngModel)]="item.nbBatiments"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="9">{{'tourneeLotReleve.nbCompteurs' | translate}}</label>
                                    <p-inputNumber  id="9" placeholder="{{'tourneeLotReleve.nbCompteurs' | translate}}" [(ngModel)]="item.nbCompteurs"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="10">{{'tourneeLotReleve.nbCompteursBatiment' | translate}}</label>
                                    <p-inputNumber  id="10" placeholder="{{'tourneeLotReleve.nbCompteursBatiment' | translate}}" [(ngModel)]="item.nbCompteursBatiment"  >
                                    </p-inputNumber>
                                    
                                </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="11">{{'tourneeLotReleve.lotReleve' | translate}}</label>
                                <p-dropdown class="w-full"  appendTo="body"  [options]="lotReleves" [(ngModel)]="item.lotReleve" id="11" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="numero" placeholder="{{'tourneeLotReleve.lotReleve' | translate}}"  >
                                </p-dropdown>
                                
                            </div>

                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="12">{{'tourneeLotReleve.actif' | translate}}</label>

                                    <p-inputSwitch id="12"  [(ngModel)]="item.actif"
                                                    >
                                    </p-inputSwitch>
                                    

                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="13">{{'tourneeLotReleve.dateCreation' | translate}}</label>
                                    <p-calendar class="w-full" appendTo="body" id="13"  [showTime]="true" [showSeconds]="false" placeholder="{{'tourneeLotReleve.dateCreation' | translate}}"  [(ngModel)]="item.dateCreation"
                                                dateFormat="{{dateFormat}}"  >
                                    </p-calendar>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="14">{{'tourneeLotReleve.dateMiseAJour' | translate}}</label>
                                    <p-calendar class="w-full" appendTo="body" id="14"  [showTime]="true" [showSeconds]="false" placeholder="{{'tourneeLotReleve.dateMiseAJour' | translate}}"  [(ngModel)]="item.dateMiseAJour"
                                                dateFormat="{{dateFormat}}"  >
                                    </p-calendar>
                                    
                                </div>

                </div>
            </p-tabPanel>
                    <p-tabPanel header="{{'tourneeLotReleve.tourneeReleveDetails' | translate}}">
                        <p-tabView [(activeIndex)]="activeTab">
                            <p-tabPanel header="Création">

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4">


                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold">Lot releve</label>
                                                    <p-dropdown class="w-full"  appendTo="body"  [options]="lotReleves" [(ngModel)]="tourneeReleveDetailsElement.lotReleve"
                                                                id="2"  [filter]="true" filterMatchMode="contains" [showClear]="true" optionLabel="numero"
                                                                placeholder="Lot releve"  >
                                                    </p-dropdown>
                                                    
                                                </div>

                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="3">Nb batiments</label>
                                                    <p-inputNumber id="nbBatiments" placeholder="Nb batiments"  [(ngModel)]="tourneeReleveDetailsElement.nbBatiments"></p-inputNumber>
                                                    
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="4">Nb compteurs</label>
                                                    <p-inputNumber id="nbCompteurs" placeholder="Nb compteurs"  [(ngModel)]="tourneeReleveDetailsElement.nbCompteurs"></p-inputNumber>
                                                    
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="5">Nb compteurs batiment</label>
                                                    <p-inputNumber id="nbCompteursBatiment" placeholder="Nb compteurs batiment"  [(ngModel)]="tourneeReleveDetailsElement.nbCompteursBatiment"></p-inputNumber>
                                                    
                                                </div>
                                    <div class="flex justify-end md:col-span-3">
                                        <button pButton type="button" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-700" (click)="addTourneeReleveDetails()">
                                            <i class="pi pi-plus"></i> OK
                                        </button>
                                    </div>

                                </div>
                            </p-tabPanel>
                            <p-tabPanel header="Liste {{item.tourneeReleveDetails?.length > 0 ? '(' + item.tourneeReleveDetails?.length + ')' : ''}}">
                                <div class="card p-4">
                                    <p-table [value]="item.tourneeReleveDetails" [scrollable]="true" scrollHeight="200px">
                                        <ng-template pTemplate="header">
                                            <tr>
                                                            <th>Lot releve</th>
                                                            <th>Nb batiments</th>
                                                            <th>Nb compteurs</th>
                                                            <th>Nb compteurs batiment</th>
                                                <th>Actions</th>
                                            </tr>
                                        </ng-template>
                                        <ng-template pTemplate="body" let-p let-i="rowIndex">
                                            <tr>
                                                        <td>{{p.lotReleve?.numero}}</td>
                                                            <td>{{p.nbBatiments}}</td>
                                                            <td>{{p.nbCompteurs}}</td>
                                                            <td>{{p.nbCompteursBatiment}}</td>
                                                <td>
                                                    <p-button (click)="deleteTourneeReleveDetails(p,i)" pButton type="button" icon="pi pi-times" severity="danger"  [rounded]="true"  class="mr-2"></p-button>
                                                    <p-button (click)="editTourneeReleveDetails(p,i)" pButton type="button" icon="pi pi-pencil" severity="success"  [rounded]="true" class="mr-2"></p-button>
                                                </td>
                                            </tr>
                                        </ng-template>
                                    </p-table>
                                </div>

                            </p-tabPanel>
                        </p-tabView>
                    </p-tabPanel>


        </p-tabView>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">

            <button class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary" label="{{'validate' | translate}}"  (click)="edit()">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideEditDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </p-dialog>
