    <p-dialog [(visible)]="createDialog" [style]="{width: '70vw'}" header="{{'batiment.tabPan' | translate}}" [modal]="true" styleClass="p-fluid" [maximizable]="true" [draggable]="false" [resizable]="false">
<ng-template pTemplate="content" >
        <p-tabs [value]="0">
<p-tablist>
<p-tab [value]="0">{{'batiment.tabPan' | translate}}</p-tab>
<p-tab [value]="1">{{'batiment.appareil' | translate}}</p-tab>
</p-tablist>
<p-tabpanels>
<p-tabpanel [value]="0">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'batiment.codeBatiment' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'batiment.codeBatiment' | translate}}" id="1" [(ngModel)]="item.codeBatiment"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validBatimentCodeBatiment}"  />
                                    <small class="text-red-500" *ngIf='!validBatimentCodeBatiment'>CodeBatiment is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'batiment.complementAdresse' | translate}}</label>
                                    <input type="text" pInputText  placeholder="{{'batiment.complementAdresse' | translate}}" id="2" [(ngModel)]="item.complementAdresse"
                                            />
                                    
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'batiment.libelle' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'batiment.libelle' | translate}}" id="3" [(ngModel)]="item.libelle"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validBatimentLibelle}"  />
                                    <small class="text-red-500" *ngIf='!validBatimentLibelle'>Libelle is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="4">{{'batiment.nombreEtages' | translate}}</label>
                                    <p-inputNumber  id="4" placeholder="{{'batiment.nombreEtages' | translate}}" [(ngModel)]="item.nombreEtages"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="5">{{'batiment.nombrePointsLivraison' | translate}}</label>
                                    <p-inputNumber  id="5" placeholder="{{'batiment.nombrePointsLivraison' | translate}}" [(ngModel)]="item.nombrePointsLivraison"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="6">{{'batiment.nombreLieuxReleve' | translate}}</label>
                                    <p-inputNumber  id="6" placeholder="{{'batiment.nombreLieuxReleve' | translate}}" [(ngModel)]="item.nombreLieuxReleve"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="7">{{'batiment.nombreLieuxConsommation' | translate}}</label>
                                    <p-inputNumber  id="7" placeholder="{{'batiment.nombreLieuxConsommation' | translate}}" [(ngModel)]="item.nombreLieuxConsommation"  >
                                    </p-inputNumber>
                                    
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="8">{{'batiment.dateCreation' | translate}}</label>
                                    <p-datepicker class="w-full" appendTo="body" id="8"  [showTime]="true" [showSeconds]="false" placeholder="{{'batiment.dateCreation' | translate}}"  [(ngModel)]="item.dateCreation"
                                                dateFormat="{{dateFormat}}"  >
                                    </p-datepicker>
                                    
                                </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="10">{{'batiment.commune' | translate}}</label>
                                <p-select class="w-full"  appendTo="body"  [options]="communes" [(ngModel)]="item.commune" id="10" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="libelle" placeholder="{{'batiment.commune' | translate}}"  >
                                </p-select>
                                
                            </div>

                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="11">{{'batiment.actif' | translate}}</label>

                                    <p-toggleswitch id="11"  [(ngModel)]="item.actif"
                                                    >
                                    </p-toggleswitch>
                                    

                                </div>


                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="12">{{'batiment.lotReleve' | translate}}</label>
                                <p-select class="w-full"  appendTo="body"  [options]="lotReleves" [(ngModel)]="item.lotReleve" id="12" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="numero" placeholder="{{'batiment.lotReleve' | translate}}"  >
                                </p-select>
                                
                            </div>

                </div>
            </p-tabpanel>
<p-tabpanel [value]="1">


                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4">


                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="1">Numero appareil<span class="text-red-500">*</span></label>
                                                    <input type="text" pInputText placeholder="Numero appareil"
                                                           id="1" [(ngModel)]="appareilElement.numeroAppareil" autofocus  [ngClass]="{'ng-invalid ng-dirty' : !validAppareilNumeroAppareil}"  >
                                                    <small class="text-red-500" *ngIf='!validAppareilNumeroAppareil'>NumeroAppareil is obligatory.</small>
                                                </div>
                                    <div class="flex justify-end md:col-span-3">
                                        <button pButton type="button" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-700" (click)="addAppareil()">
                                            <i class="pi pi-plus"></i> OK
                                        </button>
                                    </div>

                                </div>


                                <div class="card p-4">
                                    <p-table [value]="item.appareil" [scrollable]="true" scrollHeight="200px">
                                        <ng-template pTemplate="header">
                                            <tr>
                                                            <th>Numero appareil</th>
                                                <th>Actions</th>
                                            </tr>
                                        </ng-template>
                                        <ng-template pTemplate="body" let-p let-i="rowIndex">
                                            <tr>
                                                            <td>{{p.numeroAppareil}}</td>
                                                <td>
                                                    <p-button (click)="deleteAppareil(p,i)" pButton type="button" icon="pi pi-times" severity="danger"  [rounded]="true"  class="mr-2"></p-button>
                                                    <p-button (click)="editAppareil(p,i)" pButton type="button" icon="pi pi-pencil" severity="success"  [rounded]="true" class="mr-2"></p-button>
                                                </td>
                                            </tr>
                                        </ng-template>
                                    </p-table>
                                </div>


                    </p-tabpanel>
</p-tabpanels>
</p-tabs>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">

            <button (click)="save()"  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </p-dialog>
