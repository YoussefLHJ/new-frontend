<app-data-grid-edit [(visible)]="editDialog" title="{{'commune.tabPan' | translate}}" (onUpdate)="edit()" (onCancel)="hideEditDialog()">
    <p-tabs value="0">
        <p-tabpanels>
            <p-tabpanel value="0">
                <p-fluid>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
                        <div class="flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <input pInputText id="commune-code-edit" [(ngModel)]="item.code" [ngClass]="{'ng-invalid ng-dirty' : !validCommuneCode}" />
                                <label for="commune-code-edit">{{'commune.code' | translate}} *</label>
                            </p-floatlabel>
                            @if (!validCommuneCode) {
                                <small class="text-red-500">Code is obligatory.</small>
                            }
                        </div>

                        <div class="flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <input pInputText id="commune-libelle-edit" [(ngModel)]="item.libelle" [ngClass]="{'ng-invalid ng-dirty' : !validCommuneLibelle}" />
                                <label for="commune-libelle-edit">{{'commune.libelle' | translate}} *</label>
                            </p-floatlabel>
                            @if (!validCommuneLibelle) {
                                <small class="text-red-500">Libelle is obligatory.</small>
                            }
                        </div>

                        <div class="md:col-span-2 flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <textarea id="commune-description-edit" pTextarea rows="4" [autoResize]="true" [(ngModel)]="item.description"></textarea>
                                <label for="commune-description-edit">{{'commune.description' | translate}}</label>
                            </p-floatlabel>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold" for="commune-actif-edit">{{'commune.actif' | translate}}</label>
                            <p-toggleswitch id="commune-actif-edit" [(ngModel)]="item.actif"></p-toggleswitch>
                        </div>
                    </div>
                </p-fluid>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</app-data-grid-edit>
