    <app-data-grid-create [(visible)]="createDialog"  title="{{'commune.tabPan' | translate}}" (onSave)="save()" (onCancel)="hideCreateDialog()">
<ng-template pTemplate="content" >
        <p-tabView>
            <p-tabPanel header="{{'commune.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'commune.code' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'commune.code' | translate}}" id="1" [(ngModel)]="item.code"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validCommuneCode}"  />
                                        @if (!validCommuneCode)
                                        <small class="text-red-500">Code is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'commune.libelle' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'commune.libelle' | translate}}" id="2" [(ngModel)]="item.libelle"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validCommuneLibelle}"  />
                                        @if (!validCommuneLibelle)
                                        <small class="text-red-500">Libelle is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'commune.description' | translate}}</label>
                                    <textarea id="3" pTextarea rows="5" cols="30" placeholder="{{'commune.description' | translate}}"  [(ngModel)]="item.description"
                                               ></textarea>

                                </div>

                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="4">{{'commune.actif' | translate}}</label>

                                    <p-toggleswitch id="4"  [(ngModel)]="item.actif"
                                                    >
                                    </p-toggleswitch>

                                </div>


                </div>
            </p-tabPanel>

        </p-tabView>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">
            <button (click)="save()" label="{{'validate' | translate}}"  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </app-data-grid-create>
