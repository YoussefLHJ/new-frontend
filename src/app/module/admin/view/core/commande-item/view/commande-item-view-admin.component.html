<app-dialog-form [(visible)]="viewDialog" title="commandeItem.tabPan"
                 [showAction]="false" cancelLabel="common.close"
                 (onCancel)="hideViewDialog()">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
        <app-select [disabled]="true" [placeholder]="'commandeItem.commande'"
                    [options]="commandes" optionLabel="code" [(ngModel)]="item.commande" />
        <app-input [disabled]="true" [placeholder]="'commandeItem.produit'"
                   [(ngModel)]="item.produit" />
        <app-input-number [disabled]="true" [placeholder]="'commandeItem.prix'"
                          [(ngModel)]="item.prix" />
        <app-input-number [disabled]="true" [placeholder]="'commandeItem.quantite'"
                          [(ngModel)]="item.quantite" />
        <app-textarea [disabled]="true" [placeholder]="'commandeItem.description'"
                      [(ngModel)]="item.description" />
        <app-textarea [disabled]="true" [placeholder]="'commandeItem.commentaireClient'"
                      [(ngModel)]="item.commentaireClient" />
        <app-textarea [disabled]="true" [placeholder]="'commandeItem.commentaireVendeur'"
                      [(ngModel)]="item.commentaireVendeur" />
        <app-input [disabled]="true" [placeholder]="'commandeItem.code'"
                   [(ngModel)]="item.code" />
    </div>
</app-dialog-form>
