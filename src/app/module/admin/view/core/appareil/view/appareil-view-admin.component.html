<p-dialog [(visible)]="viewDialog" [style]="{width: '70vw'}" header="{{'appareil.tabPan' | translate}}" [modal]="true" class="p-fluid">
    <ng-template pTemplate="content">
        <p-tabs [value]="0">

            <p-tablist>
                <p-tab [value]="0">{{'appareil.tabPan' | translate}}</p-tab>
            </p-tablist>


            <p-tabpanels>
                <p-tabpanel [value]="0">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'appareil.numero' | translate}}</label>
                                    <input  type="text" pInputText [disabled]="true" placeholder="{{'appareil.numero' | translate}}" autofocus  id="1" [ngModel]="item.numero">
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'appareil.dernierePeriodeIndex' | translate}}</label>
                                    <p-inputNumber id="2" [disabled]="true" placeholder="{{'appareil.dernierePeriodeIndex' | translate}}" [ngModel]="item.dernierePeriodeIndex"></p-inputNumber>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'appareil.derniereAnneeIndex' | translate}}</label>
                                    <p-inputNumber id="3" [disabled]="true" placeholder="{{'appareil.derniereAnneeIndex' | translate}}" [ngModel]="item.derniereAnneeIndex"></p-inputNumber>
                                </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="4">{{'appareil.batiment' | translate}}</label>
                                <input type="text" pInputText [disabled]="true" placeholder="{{'appareil.batiment' | translate}}" autofocus  id="4" [ngModel]="item.batiment?.libelle">
                            </div>
                </div>
                </p-tabpanel>

            </p-tabpanels>
        </p-tabs>

    </ng-template>

    <ng-template pTemplate="footer" >
        <div class="flex justify-end p-4">
            <div>
                <button class="border border-gray-400 font-semibold py-2 px-4 rounded shadow" (click)="hideViewDialog()">
                    <i class="pi pi-times"></i> Annuler
                </button>
            </div>
        </div>
    </ng-template>
</p-dialog>
