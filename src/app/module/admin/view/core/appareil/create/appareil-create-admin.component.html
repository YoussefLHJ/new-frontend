    <app-data-grid-create [(visible)]="createDialog"  title="{{'appareil.tabPan' | translate}}" (onSave)="save()" (onCancel)="hideCreateDialog()">
<ng-template pTemplate="content" >
        <p-tabs value="0">
            <p-tabpanels>
            <p-tabpanel value="0">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'appareil.numero' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'appareil.numero' | translate}}" id="1" [(ngModel)]="item.numero"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validAppareilNumero}"  />
                                        @if (!validAppareilNumero) {
                                        <small class="text-red-500">Numero is obligatory.</small>
                                        }
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'appareil.dernierePeriodeIndex' | translate}}</label>
                                    <p-inputNumber  id="2" placeholder="{{'appareil.dernierePeriodeIndex' | translate}}" [(ngModel)]="item.dernierePeriodeIndex"  >
                                    </p-inputNumber>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'appareil.derniereAnneeIndex' | translate}}</label>
                                    <p-inputNumber  id="3" placeholder="{{'appareil.derniereAnneeIndex' | translate}}" [(ngModel)]="item.derniereAnneeIndex"  >
                                    </p-inputNumber>
                                </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="4">{{'appareil.batiment' | translate}}</label>
                                <p-select class="w-full"  appendTo="body"  [options]="batiments" [(ngModel)]="item.batiment" id="4" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="libelle" placeholder="{{'appareil.batiment' | translate}}"  >
                                </p-select>
                            </div>

                </div>
            </p-tabpanel>
            </p-tabpanels>
        </p-tabs>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">
            <button (click)="save()" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </app-data-grid-create>
