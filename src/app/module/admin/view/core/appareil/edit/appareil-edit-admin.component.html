<app-data-grid-edit [(visible)]="editDialog" title="{{'appareil.tabPan' | translate}}" (onUpdate)="edit()" (onCancel)="hideEditDialog()">
    <p-tabs value="0">
        <p-tabpanels>
            <p-tabpanel value="0">
                <p-fluid>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
                        <div class="flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <input pInputText id="appareil-numero-edit" [(ngModel)]="item.numero" [ngClass]="{'ng-invalid ng-dirty' : !validAppareilNumero}" />
                                <label for="appareil-numero-edit">{{'appareil.numero' | translate}} *</label>
                            </p-floatlabel>
                            @if (!validAppareilNumero) {
                                <small class="text-red-500">Numero is obligatory.</small>
                            }
                        </div>

                        <div class="flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <p-inputNumber inputId="appareil-derniere-periode-index-edit" [(ngModel)]="item.dernierePeriodeIndex" [showButtons]="true"></p-inputNumber>
                                <label for="appareil-derniere-periode-index-edit">{{'appareil.dernierePeriodeIndex' | translate}}</label>
                            </p-floatlabel>
                        </div>

                        <div class="flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <p-inputNumber inputId="appareil-derniere-annee-index-edit" [(ngModel)]="item.derniereAnneeIndex" [showButtons]="true"></p-inputNumber>
                                <label for="appareil-derniere-annee-index-edit">{{'appareil.derniereAnneeIndex' | translate}}</label>
                            </p-floatlabel>
                        </div>

                        <div class="flex flex-col gap-2">
                            <p-floatlabel variant="on">
                                <p-select inputId="appareil-batiment-edit" class="w-full" appendTo="body" [options]="batiments" [(ngModel)]="item.batiment" [filter]="true" filterMatchMode="contains" [showClear]="true" optionLabel="libelle"></p-select>
                                <label for="appareil-batiment-edit">{{'appareil.batiment' | translate}}</label>
                            </p-floatlabel>
                        </div>
                    </div>
                </p-fluid>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</app-data-grid-edit>
