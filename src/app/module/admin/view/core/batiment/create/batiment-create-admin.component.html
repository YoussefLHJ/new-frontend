    <app-data-grid-create [(visible)]="createDialog"  title="{{'batiment.tabPan' | translate}}" (onSave)="save()" (onCancel)="hideCreateDialog()">
<ng-template pTemplate="content" >
        <p-tabView>
            <p-tabPanel header="{{'batiment.tabPan' | translate}}">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="1">{{'batiment.code' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'batiment.code' | translate}}" id="1" [(ngModel)]="item.code"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validBatimentCode}"  />
                                        @if (!validBatimentCode)
                                        <small class="text-red-500">Code is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="2">{{'batiment.complementAdresse' | translate}}</label>
                                    <input type="text" pInputText  placeholder="{{'batiment.complementAdresse' | translate}}" id="2" [(ngModel)]="item.complementAdresse"
                                            />

                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="3">{{'batiment.libelle' | translate}}<span class="text-red-500">*</span></label>
                                    <input type="text" pInputText  placeholder="{{'batiment.libelle' | translate}}" id="3" [(ngModel)]="item.libelle"
                                           [ngClass]="{'ng-invalid ng-dirty' : !validBatimentLibelle}"  />
                                        @if (!validBatimentLibelle)
                                        <small class="text-red-500">Libelle is obligatory.</small>
                                </div>


                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="4">{{'batiment.nombreEtages' | translate}}</label>
                                    <p-inputNumber  id="4" placeholder="{{'batiment.nombreEtages' | translate}}" [(ngModel)]="item.nombreEtages"  >
                                    </p-inputNumber>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="5">{{'batiment.nombrePointsLivraison' | translate}}</label>
                                    <p-inputNumber  id="5" placeholder="{{'batiment.nombrePointsLivraison' | translate}}" [(ngModel)]="item.nombrePointsLivraison"  >
                                    </p-inputNumber>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="6">{{'batiment.nombreLieuxReleve' | translate}}</label>
                                    <p-inputNumber  id="6" placeholder="{{'batiment.nombreLieuxReleve' | translate}}" [(ngModel)]="item.nombreLieuxReleve"  >
                                    </p-inputNumber>
                                </div>

                                <div class="flex flex-col gap-2">
                                    <label class="text-sm font-semibold" for="7">{{'batiment.nombreLieuxConsommation' | translate}}</label>
                                    <p-inputNumber  id="7" placeholder="{{'batiment.nombreLieuxConsommation' | translate}}" [(ngModel)]="item.nombreLieuxConsommation"  >
                                    </p-inputNumber>
                                </div>

                            <div class="flex flex-col gap-2">
                                <label class="text-sm font-semibold" for="9">{{'batiment.commune' | translate}}</label>
                                <p-select class="w-full"  appendTo="body"  [options]="communes" [(ngModel)]="item.commune" id="9" [filter]="true" filterMatchMode="contains"
                                            [showClear]="true" optionLabel="libelle" placeholder="{{'batiment.commune' | translate}}"  >
                                </p-select>
                            </div>

                                <div class="flex flex-col gap-2">

                                    <label class="text-sm font-semibold" for="10">{{'batiment.actif' | translate}}</label>

                                    <p-toggleswitch id="10"  [(ngModel)]="item.actif"
                                                    >
                                    </p-toggleswitch>

                                </div>


                </div>
            </p-tabPanel>
                    <p-tabPanel header="{{'batiment.appareils' | translate}}">


                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4">


                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="1">Numero<span class="text-red-500">*</span></label>
                                                    <input type="text" pInputText placeholder="Numero"
                                                           id="1" [(ngModel)]="appareilsElement.numero" autofocus  [ngClass]="{'ng-invalid ng-dirty' : !validAppareilsNumero}"  >
                                                        @if (!validAppareilsNumero)
                                                        <small class="text-red-500">Numero is obligatory.</small>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="2">Derniere periode index</label>
                                                    <p-inputNumber id="dernierePeriodeIndex" placeholder="Derniere periode index"  [(ngModel)]="appareilsElement.dernierePeriodeIndex"></p-inputNumber>
                                                </div>
                                                <div class="flex flex-col gap-2">
                                                    <label class="text-sm font-semibold" for="3">Derniere annee index</label>
                                                    <p-inputNumber id="derniereAnneeIndex" placeholder="Derniere annee index"  [(ngModel)]="appareilsElement.derniereAnneeIndex"></p-inputNumber>
                                                </div>
                                    <div class="flex justify-end md:col-span-3">
                                        <button pButton type="button" class="bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-700" (click)="addAppareils()">
                                            <i class="pi pi-plus"></i> OK
                                        </button>
                                    </div>

                                </div>


                                <div class="card p-4">
                                    <p-table [value]="item.appareils" [scrollable]="true" scrollHeight="200px">
                                        <ng-template pTemplate="header">
                                            <tr>
                                                            <th>Numero</th>
                                                            <th>Derniere periode index</th>
                                                            <th>Derniere annee index</th>
                                                <th>Actions</th>
                                            </tr>
                                        </ng-template>
                                        <ng-template pTemplate="body" let-p let-i="rowIndex">
                                            <tr>
                                                            <td>{{p.numero}}</td>
                                                            <td>{{p.dernierePeriodeIndex}}</td>
                                                            <td>{{p.derniereAnneeIndex}}</td>
                                                <td>
                                                    <p-button (click)="deleteAppareils(p,i)" pButton type="button" icon="pi pi-times" severity="danger"  [rounded]="true"  class="mr-2"></p-button>
                                                    <p-button (click)="editAppareils(p,i)" pButton type="button" icon="pi pi-pencil" severity="success"  [rounded]="true" class="mr-2"></p-button>
                                                </td>
                                            </tr>
                                        </ng-template>
                                    </p-table>
                                </div>


                    </p-tabPanel>


        </p-tabView>

</ng-template>

<ng-template pTemplate="footer" >
    <div class="flex justify-end space-x-3 p-4">
            <button (click)="save()" label="{{'validate' | translate}}"  class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-primary">
                <i class="pi pi-check"></i> {{'validate' | translate}}
            </button>

                <button (click)="hideCreateDialog()" class="border border-gray-400 text-gray-600 hover:bg-gray-200 px-4 py-2 rounded-md">
                    <i class="pi pi-times"></i> {{'cancel' | translate}}
                </button>

    </div>
</ng-template>

    </app-data-grid-create>
